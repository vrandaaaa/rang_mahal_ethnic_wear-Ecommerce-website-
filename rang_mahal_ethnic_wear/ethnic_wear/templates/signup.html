{% extends "base.html" %}
{% block title %}Sign Up — Rang Mahal{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-visual">
        <div class="auth-visual-content">
            <div class="auth-logo">Rang Mahal</div>
            <p>Join thousands of ethnic fashion lovers</p>
            <div class="auth-motifs"><span>✦</span><span>❋</span><span>✿</span></div>
        </div>
    </div>
    <div class="auth-form-wrap">
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-sub">Join the Rang Mahal family</p>
            <form action="{{ url_for('signup') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="name" required class="form-input input-with-icon" placeholder="Priya Sharma">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" name="email" required class="form-input input-with-icon" placeholder="priya@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" required class="form-input input-with-icon" placeholder="Min 6 characters" id="signupPwd">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('signupPwd', this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="confirm_password" required class="form-input input-with-icon" placeholder="Repeat password" id="confirmPwd">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('confirmPwd', this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePwd(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';
}
</script>
{% endblock %}
